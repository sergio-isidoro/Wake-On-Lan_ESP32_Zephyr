# ── Kernel ──────────────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=4096

# ── GPIO / SPI ───────────────────────────────────────────────────────────────
CONFIG_GPIO=y
CONFIG_SPI=y

# ── Display (ST7789V via MIPI-DBI SPI wrapper) ───────────────────────────────
CONFIG_DISPLAY=y
CONFIG_DISPLAY_LOG_LEVEL_ERR=y

# ── LVGL ─────────────────────────────────────────────────────────────────────
CONFIG_LVGL=y
CONFIG_LV_COLOR_16_SWAP=y
# CONFIG_LV_MEM_CUSTOM removed in LVGL v9 (heap controlled by LV_Z_MEM_POOL_SIZE)
CONFIG_LV_Z_MEM_POOL_SIZE=32768

CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_MONTSERRAT_24=y
CONFIG_LV_FONT_MONTSERRAT_32=y

# ── Logging ──────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# ── Networking (Wi-Fi) ───────────────────────────────────────────────────────
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y
CONFIG_WIFI=y
CONFIG_WIFI_ESP32=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y

# ── NVS Storage ──────────────────────────────────────────────────────────────
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# ── DNS / HTTP (captive portal) ──────────────────────────────────────────────
CONFIG_DNS_RESOLVER=y
CONFIG_NET_TCP=y
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_HOSTNAME="WOL_ESP"

# ── Heap / Memory ────────────────────────────────────────────────────────────
CONFIG_HEAP_MEM_POOL_SIZE=49152

# ── Reboot ───────────────────────────────────────────────────────────────────
CONFIG_REBOOT=y

# ── Watchdog ─────────────────────────────────────────────────────────────────
CONFIG_WATCHDOG=y


# ── Kernel ──────────────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=6144
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# ── GPIO / SPI ───────────────────────────────────────────────────────────────
CONFIG_GPIO=y
CONFIG_SPI=y

# ── Display (ST7789V via MIPI-DBI SPI wrapper) ───────────────────────────────
CONFIG_DISPLAY=y
CONFIG_DISPLAY_LOG_LEVEL_ERR=y

# ── LVGL ─────────────────────────────────────────────────────────────────────
CONFIG_LVGL=y
CONFIG_LV_COLOR_16_SWAP=y
#CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_Z_MEM_POOL_SIZE=24576

# Custom font C files in src/fonts/ (lv_font_wol_14 / lv_font_wol_24)
# cover ASCII 0x20-0x7E, U+2022 •, U+26A1 ⚡, braille U+280B..U+28A7.
#
# IMPORTANT: Zephyr LVGL requires a built-in font as LV_FONT_DEFAULT.
# Without it, lv_font_default__ = NULL → all labels show squares.
# We enable Montserrat 14 as the system default; our custom fonts
# are applied explicitly via lv_obj_set_style_text_font() per widget.
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_MONTSERRAT_24=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_14=y

# LVGL display buffer — 10% of screen (240×240×2 = 115200 B full frame).
# Keeping it small (≈11520 B) avoids dram0.noinit overflow.
# Core 1 calls lv_task_handler() at 40 FPS so partial refresh is fine.
CONFIG_LV_Z_VDB_SIZE=10
CONFIG_LV_Z_DOUBLE_VDB=n

# UTF-8 support — required for braille
CONFIG_LV_TXT_ENC_UTF8=y
CONFIG_COMPILER_OPT="-finput-charset=UTF-8"



# ── Logging ──────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# ── Networking (Wi-Fi) ───────────────────────────────────────────────────────
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y
CONFIG_WIFI=y
CONFIG_WIFI_ESP32=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y

# ── NVS Storage ──────────────────────────────────────────────────────────────
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# ── DNS / HTTP (captive portal) ──────────────────────────────────────────────
CONFIG_DNS_RESOLVER=y
CONFIG_NET_TCP=y
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_HOSTNAME="WOL_ESP"

# ── Heap / Memory ────────────────────────────────────────────────────────────
CONFIG_HEAP_MEM_POOL_SIZE=49152

# ── Reboot ───────────────────────────────────────────────────────────────────
CONFIG_REBOOT=y

# ── Watchdog ─────────────────────────────────────────────────────────────────
CONFIG_WATCHDOG=y

# ── Stack overflow detection ──────────────────────────────────────────────────
CONFIG_THREAD_STACK_INFO=y
CONFIG_THREAD_NAME=y
CONFIG_STACK_SENTINEL=y

CONFIG_PWM=y